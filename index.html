<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 Пупсик Мессенджер</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        
        * {
            font-family: 'Nunito', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
        
        .message-in {
            background: linear-gradient(135deg, #e0e7ff 0%, #f0e6ff 100%);
            border-radius: 20px 20px 20px 4px;
        }
        
        .message-out {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px 20px 4px 20px;
            color: white;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .pulse-dot {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        .typing-dots span {
            animation: typing 1.4s infinite;
            animation-fill-mode: both;
        }
        
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        .shake {
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .status-connecting { color: #f59e0b; }
        .status-online { color: #10b981; }
        .status-offline { color: #ef4444; }
        
        #messages::-webkit-scrollbar {
            width: 6px;
        }
        
        #messages::-webkit-scrollbar-track {
            background: transparent;
        }
        
        #messages::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 3px;
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .retry-btn {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    
    <div class="glass rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
        <!-- Header -->
        <div class="gradient-bg p-4 text-white">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="text-3xl">💕</span>
                    <div>
                        <h1 class="text-xl font-bold">Пупсик Мессенджер</h1>
                        <div id="statusBar" class="text-sm opacity-90 flex items-center gap-2">
                            <span class="loader"></span>
                            <span>Подключение к серверу...</span>
                        </div>
                    </div>
                </div>
                <button onclick="copyMyId()" id="copyBtn" class="bg-white/20 hover:bg-white/30 rounded-full p-2 transition hidden" title="Копировать ID">
                    📋
                </button>
            </div>
        </div>

        <!-- Connection Panel -->
        <div id="connectionPanel" class="p-4 border-b border-purple-100">
            <!-- Server Status -->
            <div id="serverStatus" class="mb-4 p-3 bg-yellow-50 rounded-xl border border-yellow-200">
                <div class="flex items-center gap-2">
                    <span class="loader" style="border-color: rgba(245,158,11,0.3); border-top-color: #f59e0b; width: 16px; height: 16px;"></span>
                    <span class="text-yellow-700 text-sm font-medium">Подключение к серверу...</span>
                </div>
            </div>

            <!-- My ID -->
            <div id="myIdSection" class="mb-4 hidden">
                <label class="text-sm font-semibold text-gray-600 mb-2 block">🎀 Твой ID (отправь другу):</label>
                <div class="flex gap-2">
                    <input type="text" id="myId" readonly 
                        class="flex-1 bg-gradient-to-r from-purple-50 to-pink-50 border-2 border-purple-200 rounded-xl px-4 py-3 font-mono text-purple-700 font-bold text-center">
                    <button onclick="copyMyId()" class="btn-primary text-white px-4 rounded-xl font-bold">
                        📋
                    </button>
                </div>
            </div>
            
            <!-- Connect to Friend -->
            <div id="connectSection" class="hidden">
                <label class="text-sm font-semibold text-gray-600 mb-2 block">💌 ID друга:</label>
                <div class="flex gap-2">
                    <input type="text" id="friendId" placeholder="Вставь ID друга сюда"
                        class="flex-1 border-2 border-purple-200 rounded-xl px-4 py-3 focus:border-purple-400 focus:outline-none transition">
                    <button onclick="connectToFriend()" id="connectBtn" class="btn-primary text-white px-6 rounded-xl font-bold">
                        🔗
                    </button>
                </div>
            </div>

            <!-- Retry Button -->
            <button id="retryBtn" onclick="retryConnection()" class="hidden w-full retry-btn text-white px-6 py-3 rounded-xl font-bold mt-3 hover:opacity-90 transition">
                🔄 Попробовать снова
            </button>
        </div>

        <!-- Chat Area -->
        <div id="chatArea" class="hidden flex flex-col" style="height: 400px;">
            <!-- Chat Header -->
            <div class="p-3 bg-gradient-to-r from-purple-50 to-pink-50 border-b flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-r from-purple-400 to-pink-400 flex items-center justify-center text-white font-bold">
                    💕
                </div>
                <div class="flex-1">
                    <div class="font-bold text-gray-800">Пупсик</div>
                    <div id="friendStatus" class="text-sm text-green-500 flex items-center gap-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full pulse-dot"></span>
                        Онлайн
                    </div>
                </div>
                <button onclick="disconnect()" class="text-gray-400 hover:text-red-500 transition" title="Отключиться">
                    ✖️
                </button>
            </div>

            <!-- Messages -->
            <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-3">
                <div class="text-center text-gray-400 text-sm py-8">
                    💕 Начните общение! 💕
                </div>
            </div>

            <!-- Typing Indicator -->
            <div id="typingIndicator" class="hidden px-4 py-2 text-sm text-gray-500">
                <span class="typing-dots">
                    Пупсик печатает<span>.</span><span>.</span><span>.</span>
                </span>
            </div>

            <!-- Input Area -->
            <div class="p-3 border-t bg-white">
                <div class="flex gap-2">
                    <input type="text" id="messageInput" placeholder="Напиши сообщение..."
                        class="flex-1 border-2 border-purple-200 rounded-full px-4 py-3 focus:border-purple-400 focus:outline-none transition"
                        onkeypress="handleKeyPress(event)" oninput="handleTyping()">
                    <button onclick="sendMessage()" class="btn-primary text-white w-12 h-12 rounded-full flex items-center justify-center text-xl">
                        💌
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="p-3 text-center text-xs text-gray-400 border-t">
            🔒 Прямое P2P соединение • Сообщения не хранятся на сервере
        </div>
    </div>

    <!-- Notification Sound -->
    <audio id="notificationSound" preload="auto">
        <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdH2LkpONgHBka3eBi5KTjX9xZGl0gYuSk42AcGVqc4GLkpONgHBlanOBi5KTjYBwZWpzgYuSk42AcGVqc4GLkpONgHBlanOBi5KTjYBwZWpzgYuSk42AcGVqc4GLkpONf3BlanOBi5KTjYBwZWpzgYuSk42AcGVqc4GLkpONgHBlanOBi5KTjYBwZWpzgYuSk42AcGVqc4CLkpONgHBlanOBi5KTjX9wZWpzgYuSk42AcGVqc4GLkpONgHBlanOBi5KTjYBwZWpzgYuSk42AcGVqc4CLkpONgHBlanOBi5KTjX9wZWpz" type="audio/wav">
    </audio>

    <script>
        let peer = null;
        let conn = null;
        let myId = '';
        let typingTimeout = null;
        let isConnected = false;
        let connectionAttempts = 0;
        const maxAttempts = 3;

        // Список резервных серверов PeerJS
        const peerServers = [
            { host: '0.peerjs.com', port: 443, secure: true },
            { host: 'peerjs-server.herokuapp.com', port: 443, secure: true },
            { secure: true } // Дефолтный PeerJS облачный сервер
        ];

        let currentServerIndex = 0;

        // Генерация простого ID (только английские буквы и цифры!)
        function generateId() {
            const chars = 'abcdefghijklmnopqrstuvwxyz';
            const nums = '0123456789';
            let id = 'pupsik-';
            for (let i = 0; i < 4; i++) {
                id += chars[Math.floor(Math.random() * chars.length)];
            }
            id += '-';
            for (let i = 0; i < 4; i++) {
                id += nums[Math.floor(Math.random() * nums.length)];
            }
            return id;
        }

        // Инициализация PeerJS с выбранным сервером
        function initPeer() {
            connectionAttempts++;
            myId = generateId();
            
            updateServerStatus('connecting', `Попытка ${connectionAttempts}/${maxAttempts}...`);
            
            const serverConfig = peerServers[currentServerIndex];
            
            const config = {
                debug: 1,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                        { urls: 'stun:stun3.l.google.com:19302' },
                        { urls: 'stun:stun4.l.google.com:19302' },
                        { urls: 'stun:global.stun.twilio.com:3478' },
                        { 
                            urls: 'turn:numb.viagenie.ca',
                            username: 'webrtc@live.com',
                            credential: 'muazkh'
                        },
                        {
                            urls: 'turn:turn.anyfirewall.com:443?transport=tcp',
                            username: 'webrtc',
                            credential: 'webrtc'
                        }
                    ]
                }
            };

            // Добавляем настройки сервера если они указаны
            if (serverConfig.host) {
                config.host = serverConfig.host;
                config.port = serverConfig.port;
                config.secure = serverConfig.secure;
                config.path = '/';
            }

            // Очищаем старый peer если есть
            if (peer) {
                peer.destroy();
            }

            peer = new Peer(myId, config);

            // Таймаут для подключения
            const connectionTimeout = setTimeout(() => {
                if (!peer || peer.disconnected) {
                    tryNextServer();
                }
            }, 10000);

            peer.on('open', (id) => {
                clearTimeout(connectionTimeout);
                myId = id;
                document.getElementById('myId').value = id;
                document.getElementById('myIdSection').classList.remove('hidden');
                document.getElementById('connectSection').classList.remove('hidden');
                document.getElementById('copyBtn').classList.remove('hidden');
                document.getElementById('retryBtn').classList.add('hidden');
                
                updateServerStatus('online', 'Готов к подключению!');
                updateStatus('online', '✅ Готов! Жду подключения...');
                
                connectionAttempts = 0;
            });

            peer.on('connection', (connection) => {
                conn = connection;
                setupConnection();
            });

            peer.on('error', (err) => {
                clearTimeout(connectionTimeout);
                console.error('Peer error:', err);
                
                if (err.type === 'peer-unavailable') {
                    updateStatus('offline', '❌ Друг не найден. Проверь ID!');
                    document.getElementById('friendId').classList.add('shake');
                    setTimeout(() => document.getElementById('friendId').classList.remove('shake'), 500);
                } else if (err.type === 'network' || err.type === 'server-error' || err.type === 'socket-error') {
                    tryNextServer();
                } else {
                    updateServerStatus('error', `Ошибка: ${err.type}`);
                }
            });

            peer.on('disconnected', () => {
                if (!isConnected) {
                    updateStatus('offline', '⚠️ Соединение потеряно');
                }
            });
        }

        // Попробовать следующий сервер
        function tryNextServer() {
            if (connectionAttempts < maxAttempts) {
                currentServerIndex = (currentServerIndex + 1) % peerServers.length;
                updateServerStatus('connecting', `Пробую другой сервер...`);
                setTimeout(initPeer, 1000);
            } else {
                updateServerStatus('error', 'Не удалось подключиться');
                document.getElementById('retryBtn').classList.remove('hidden');
                updateStatus('offline', '❌ Сервер недоступен');
            }
        }

        // Повторить подключение
        function retryConnection() {
            connectionAttempts = 0;
            currentServerIndex = 0;
            document.getElementById('retryBtn').classList.add('hidden');
            initPeer();
        }

        // Обновление статуса сервера
        function updateServerStatus(status, text) {
            const el = document.getElementById('serverStatus');
            if (status === 'connecting') {
                el.className = 'mb-4 p-3 bg-yellow-50 rounded-xl border border-yellow-200';
                el.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="loader" style="border-color: rgba(245,158,11,0.3); border-top-color: #f59e0b; width: 16px; height: 16px;"></span>
                        <span class="text-yellow-700 text-sm font-medium">${text}</span>
                    </div>
                `;
            } else if (status === 'online') {
                el.className = 'mb-4 p-3 bg-green-50 rounded-xl border border-green-200';
                el.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-green-500 rounded-full pulse-dot"></span>
                        <span class="text-green-700 text-sm font-medium">${text}</span>
                    </div>
                `;
            } else if (status === 'error') {
                el.className = 'mb-4 p-3 bg-red-50 rounded-xl border border-red-200';
                el.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="text-red-500">❌</span>
                        <span class="text-red-700 text-sm font-medium">${text}</span>
                    </div>
                `;
            }
        }

        // Обновление статуса
        function updateStatus(type, text) {
            const statusBar = document.getElementById('statusBar');
            statusBar.className = `text-sm opacity-90 flex items-center gap-2 status-${type}`;
            
            if (type === 'connecting') {
                statusBar.innerHTML = `<span class="loader"></span><span>${text}</span>`;
            } else {
                statusBar.innerHTML = `<span>${text}</span>`;
            }
        }

        // Подключение к другу
        function connectToFriend() {
            const friendId = document.getElementById('friendId').value.trim();
            if (!friendId) {
                document.getElementById('friendId').classList.add('shake');
                setTimeout(() => document.getElementById('friendId').classList.remove('shake'), 500);
                return;
            }

            updateStatus('connecting', '🔄 Подключаюсь к другу...');
            document.getElementById('connectBtn').disabled = true;
            document.getElementById('connectBtn').innerHTML = '<span class="loader" style="width:16px;height:16px;margin:0;"></span>';

            conn = peer.connect(friendId, { reliable: true });
            
            // Таймаут подключения к другу
            const friendTimeout = setTimeout(() => {
                if (!isConnected) {
                    updateStatus('offline', '❌ Не удалось подключиться. Друг онлайн?');
                    document.getElementById('connectBtn').disabled = false;
                    document.getElementById('connectBtn').innerHTML = '🔗';
                }
            }, 15000);

            conn.on('open', () => {
                clearTimeout(friendTimeout);
                setupConnection();
            });

            conn.on('error', (err) => {
                clearTimeout(friendTimeout);
                console.error('Connection error:', err);
                updateStatus('offline', '❌ Ошибка подключения');
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('connectBtn').innerHTML = '🔗';
            });
        }

        // Настройка соединения
        function setupConnection() {
            isConnected = true;
            document.getElementById('connectionPanel').classList.add('hidden');
            document.getElementById('chatArea').classList.remove('hidden');
            updateStatus('online', '💚 Подключено!');
            
            // Очищаем чат
            document.getElementById('messages').innerHTML = `
                <div class="text-center text-gray-400 text-sm py-4 fade-in">
                    🎉 Соединение установлено! 🎉
                </div>
            `;

            conn.on('data', (data) => {
                if (data.type === 'message') {
                    addMessage(data.text, 'in');
                    playNotification();
                } else if (data.type === 'typing') {
                    showTyping(data.isTyping);
                }
            });

            conn.on('close', () => {
                isConnected = false;
                addMessage('💔 Друг отключился', 'system');
                document.getElementById('friendStatus').innerHTML = `
                    <span class="w-2 h-2 bg-red-500 rounded-full"></span>
                    Оффлайн
                `;
                document.getElementById('friendStatus').className = 'text-sm text-red-500 flex items-center gap-1';
            });

            conn.on('error', (err) => {
                console.error('Connection error:', err);
                addMessage('⚠️ Ошибка соединения', 'system');
            });
        }

        // Отправка сообщения
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !conn || !conn.open) return;

            conn.send({ type: 'message', text: text });
            addMessage(text, 'out');
            input.value = '';
            
            // Отправляем что перестали печатать
            conn.send({ type: 'typing', isTyping: false });
        }

        // Добавление сообщения в чат
        function addMessage(text, type) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'fade-in';
            
            const time = new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
            
            // Делаем ссылки кликабельными
            const linkedText = text.replace(
                /(https?:\/\/[^\s]+)/g, 
                '<a href="$1" target="_blank" class="underline hover:opacity-80">$1</a>'
            );
            
            if (type === 'out') {
                div.innerHTML = `
                    <div class="flex justify-end">
                        <div class="message-out px-4 py-2 max-w-[80%] shadow-md">
                            <div>${linkedText}</div>
                            <div class="text-xs opacity-70 text-right mt-1">${time}</div>
                        </div>
                    </div>
                `;
            } else if (type === 'in') {
                div.innerHTML = `
                    <div class="flex justify-start">
                        <div class="message-in px-4 py-2 max-w-[80%] shadow-md">
                            <div class="text-gray-800">${linkedText}</div>
                            <div class="text-xs text-gray-400 mt-1">${time}</div>
                        </div>
                    </div>
                `;
            } else if (type === 'system') {
                div.innerHTML = `
                    <div class="text-center text-gray-400 text-sm py-2">${text}</div>
                `;
            }
            
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        // Обработка нажатия клавиш
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Обработка печати
        function handleTyping() {
            if (!conn || !conn.open) return;
            
            conn.send({ type: 'typing', isTyping: true });
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                if (conn && conn.open) {
                    conn.send({ type: 'typing', isTyping: false });
                }
            }, 2000);
        }

        // Показать индикатор печати
        function showTyping(isTyping) {
            document.getElementById('typingIndicator').classList.toggle('hidden', !isTyping);
            if (isTyping) {
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
        }

        // Копирование ID
        function copyMyId() {
            const id = document.getElementById('myId').value;
            navigator.clipboard.writeText(id).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerHTML = '✅';
                setTimeout(() => btn.innerHTML = '📋', 2000);
            }).catch(() => {
                // Фоллбек для старых браузеров
                const input = document.getElementById('myId');
                input.select();
                document.execCommand('copy');
                alert('ID скопирован: ' + id);
            });
        }

        // Отключение
        function disconnect() {
            if (conn) {
                conn.close();
            }
            isConnected = false;
            document.getElementById('chatArea').classList.add('hidden');
            document.getElementById('connectionPanel').classList.remove('hidden');
            document.getElementById('friendId').value = '';
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('connectBtn').innerHTML = '🔗';
            updateStatus('online', '✅ Готов! Жду подключения...');
        }

        // Звук уведомления
        function playNotification() {
            try {
                const audio = document.getElementById('notificationSound');
                audio.currentTime = 0;
                audio.play().catch(() => {});
            } catch (e) {}
            
            // Браузерное уведомление
            if (Notification.permission === 'granted' && document.hidden) {
                new Notification('💕 Пупсик Мессенджер', {
                    body: 'Новое сообщение!',
                    icon: '💕'
                });
            }
        }

        // Запрос разрешения на уведомления
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        // Запуск
        initPeer();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пупсик Мессенджер 💕</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        
        * {
            font-family: 'Nunito', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
        }
        
        .chat-gradient {
            background: linear-gradient(180deg, #fff5f7 0%, #ffffff 100%);
        }
        
        .message-in {
            background: linear-gradient(135deg, #f0f0f0 0%, #e8e8e8 100%);
            border-radius: 20px 20px 20px 4px;
        }
        
        .message-out {
            background: linear-gradient(135deg, #ff9a9e 0%, #ffb6c1 100%);
            border-radius: 20px 20px 4px 20px;
            color: white;
        }
        
        .btn-pink {
            background: linear-gradient(135deg, #ff9a9e 0%, #ff6b81 100%);
            transition: all 0.3s ease;
        }
        
        .btn-pink:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 129, 0.3);
        }
        
        .pulse-dot {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }
        
        .typing-dots span {
            animation: typingDot 1.4s infinite;
            display: inline-block;
        }
        
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingDot {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }
        
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        #messages::-webkit-scrollbar {
            width: 6px;
        }
        
        #messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        #messages::-webkit-scrollbar-thumb {
            background: #ffb6c1;
            border-radius: 10px;
        }
        
        .copy-tooltip {
            animation: fadeInOut 2s forwards;
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <!-- Главный экран подключения -->
    <div id="connectScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white/90 backdrop-blur-lg rounded-3xl shadow-2xl p-8 max-w-md w-full">
            <div class="text-center mb-8">
                <div class="text-6xl mb-4 float-animation">💕</div>
                <h1 class="text-3xl font-extrabold bg-gradient-to-r from-pink-500 to-rose-500 bg-clip-text text-transparent">
                    Пупсик Мессенджер
                </h1>
                <p class="text-gray-500 mt-2">Общайся с любимыми по всему миру 🌍</p>
            </div>
            
            <!-- Статус подключения -->
            <div id="connectionStatus" class="mb-6 p-4 bg-yellow-50 rounded-2xl border-2 border-yellow-200">
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 bg-yellow-400 rounded-full pulse-dot"></div>
                    <span class="text-yellow-700 font-semibold">Подключение к сети...</span>
                </div>
            </div>
            
            <!-- Твой ID -->
            <div id="myIdSection" class="mb-6 hidden">
                <label class="block text-gray-600 font-semibold mb-2">🆔 Твой ID (отправь другу):</label>
                <div class="flex gap-2">
                    <input type="text" id="myId" readonly 
                        class="flex-1 px-4 py-3 bg-pink-50 border-2 border-pink-200 rounded-xl font-mono text-lg text-center">
                    <button onclick="copyMyId()" 
                        class="px-4 py-3 bg-pink-100 hover:bg-pink-200 rounded-xl transition-colors relative">
                        📋
                        <span id="copyTooltip" class="hidden absolute -top-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-xs px-2 py-1 rounded copy-tooltip">
                            Скопировано!
                        </span>
                    </button>
                </div>
            </div>
            
            <!-- Подключиться к другу -->
            <div id="connectSection" class="mb-6 hidden">
                <label class="block text-gray-600 font-semibold mb-2">👫 ID друга:</label>
                <input type="text" id="friendId" placeholder="Вставь ID друга сюда"
                    class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-pink-400 focus:outline-none transition-colors mb-3">
                <button onclick="connectToFriend()" 
                    class="w-full py-3 btn-pink text-white font-bold rounded-xl shadow-lg">
                    💌 Подключиться
                </button>
            </div>
            
            <!-- Ожидание -->
            <div id="waitingSection" class="hidden text-center py-4">
                <div class="text-4xl mb-3">⏳</div>
                <p class="text-gray-600">Или подожди, пока друг подключится к тебе...</p>
            </div>
            
            <!-- Ошибка -->
            <div id="errorSection" class="hidden p-4 bg-red-50 rounded-2xl border-2 border-red-200">
                <p class="text-red-600 font-semibold" id="errorText"></p>
            </div>
        </div>
    </div>
    
    <!-- Экран чата -->
    <div id="chatScreen" class="hidden min-h-screen flex flex-col">
        <!-- Шапка чата -->
        <div class="bg-white/90 backdrop-blur-lg shadow-lg px-4 py-3">
            <div class="max-w-2xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="text-3xl">💕</div>
                    <div>
                        <h1 class="font-bold text-gray-800">Пупсик Мессенджер</h1>
                        <div id="chatStatus" class="text-sm text-green-500 flex items-center gap-1">
                            <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                            <span>Подключено</span>
                        </div>
                    </div>
                </div>
                <button onclick="disconnect()" class="px-4 py-2 bg-red-100 hover:bg-red-200 text-red-600 rounded-xl transition-colors font-semibold">
                    Выйти
                </button>
            </div>
        </div>
        
        <!-- Сообщения -->
        <div class="flex-1 overflow-hidden">
            <div id="messages" class="h-full overflow-y-auto p-4 chat-gradient">
                <div class="max-w-2xl mx-auto space-y-3">
                    <!-- Сообщения появятся здесь -->
                </div>
            </div>
        </div>
        
        <!-- Индикатор печати -->
        <div id="typingIndicator" class="hidden px-4 py-2 bg-white/80">
            <div class="max-w-2xl mx-auto">
                <span class="text-gray-500 text-sm typing-dots">
                    Пупсик печатает<span>.</span><span>.</span><span>.</span>
                </span>
            </div>
        </div>
        
        <!-- Поле ввода -->
        <div class="bg-white/90 backdrop-blur-lg border-t border-gray-100 p-4">
            <div class="max-w-2xl mx-auto flex gap-3">
                <input type="text" id="messageInput" placeholder="Напиши сообщение... 💭"
                    class="flex-1 px-4 py-3 border-2 border-gray-200 rounded-2xl focus:border-pink-400 focus:outline-none transition-colors"
                    onkeypress="handleKeyPress(event)" oninput="handleTyping()">
                <button onclick="sendMessage()" 
                    class="px-6 py-3 btn-pink text-white font-bold rounded-2xl shadow-lg">
                    💌
                </button>
            </div>
        </div>
    </div>
    
    <!-- Аудио для уведомлений -->
    <audio id="notificationSound" preload="auto">
        <source src="data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA/+M4wAAAAAAAAAAAAEluZm8AAAAPAAAAAwAAAbAAqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV////////////////////////////////////////////AAAAAExhdmM1OC4xMwAAAAAAAAAAAAAAACQAAAAAAAAAAQGwBMQElgAAAAAAAAAAAAAAAAD/4xjEAAAAA0gAAAAANIAAAAA0gAAAAAA/4xjEWwAAA0gAAAAANIAAAAA0gAAAAAA=" type="audio/mp3">
    </audio>

    <script>
        let peer = null;
        let connection = null;
        let myPeerId = null;
        let typingTimeout = null;
        
        // Инициализация PeerJS
        function initPeer() {
            // Генерируем красивый короткий ID
            const shortId = 'pupsik-' + Math.random().toString(36).substr(2, 6);
            
            peer = new Peer(shortId, {
                debug: 2
            });
            
            peer.on('open', (id) => {
                myPeerId = id;
                document.getElementById('myId').value = id;
                document.getElementById('connectionStatus').innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-3 h-3 bg-green-500 rounded-full pulse-dot"></div>
                        <span class="text-green-700 font-semibold">Готов к подключению! ✨</span>
                    </div>
                `;
                document.getElementById('connectionStatus').className = 'mb-6 p-4 bg-green-50 rounded-2xl border-2 border-green-200';
                document.getElementById('myIdSection').classList.remove('hidden');
                document.getElementById('connectSection').classList.remove('hidden');
                document.getElementById('waitingSection').classList.remove('hidden');
            });
            
            peer.on('connection', (conn) => {
                connection = conn;
                setupConnection();
            });
            
            peer.on('error', (err) => {
                console.error('Peer error:', err);
                showError('Ошибка подключения: ' + err.type);
            });
        }
        
        // Подключиться к другу
        function connectToFriend() {
            const friendId = document.getElementById('friendId').value.trim();
            
            if (!friendId) {
                showError('Введи ID друга! 🙈');
                return;
            }
            
            if (friendId === myPeerId) {
                showError('Это твой собственный ID! 😅');
                return;
            }
            
            connection = peer.connect(friendId, {
                reliable: true
            });
            
            setupConnection();
        }
        
        // Настройка соединения
        function setupConnection() {
            connection.on('open', () => {
                console.log('Соединение установлено!');
                showChatScreen();
                addSystemMessage('🎉 Соединение установлено! Можете общаться!');
            });
            
            connection.on('data', (data) => {
                if (data.type === 'message') {
                    addMessage(data.text, false);
                    playNotification();
                } else if (data.type === 'typing') {
                    showTypingIndicator();
                }
            });
            
            connection.on('close', () => {
                addSystemMessage('😢 Друг отключился');
                document.getElementById('chatStatus').innerHTML = `
                    <div class="w-2 h-2 bg-red-500 rounded-full"></div>
                    <span class="text-red-500">Отключено</span>
                `;
            });
            
            connection.on('error', (err) => {
                console.error('Connection error:', err);
                showError('Ошибка соединения');
            });
        }
        
        // Отправить сообщение
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !connection) return;
            
            connection.send({
                type: 'message',
                text: text
            });
            
            addMessage(text, true);
            input.value = '';
        }
        
        // Обработка Enter
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // Индикатор печати
        function handleTyping() {
            if (connection && connection.open) {
                connection.send({ type: 'typing' });
            }
        }
        
        function showTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            indicator.classList.remove('hidden');
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                indicator.classList.add('hidden');
            }, 2000);
        }
        
        // Добавить сообщение в чат
        function addMessage(text, isOwn) {
            const messagesContainer = document.querySelector('#messages > div');
            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            
            // Делаем ссылки кликабельными
            const linkedText = text.replace(
                /(https?:\/\/[^\s]+)/g, 
                '<a href="$1" target="_blank" class="underline">$1</a>'
            );
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${isOwn ? 'justify-end' : 'justify-start'}`;
            messageDiv.innerHTML = `
                <div class="${isOwn ? 'message-out' : 'message-in'} px-4 py-2 max-w-[80%] shadow-sm">
                    <p class="break-words">${linkedText}</p>
                    <p class="text-xs ${isOwn ? 'text-white/70' : 'text-gray-400'} mt-1">${time}</p>
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }
        
        // Системное сообщение
        function addSystemMessage(text) {
            const messagesContainer = document.querySelector('#messages > div');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'text-center';
            messageDiv.innerHTML = `
                <span class="inline-block px-4 py-2 bg-pink-100 text-pink-600 rounded-full text-sm">
                    ${text}
                </span>
            `;
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }
        
        // Прокрутка вниз
        function scrollToBottom() {
            const messages = document.getElementById('messages');
            messages.scrollTop = messages.scrollHeight;
        }
        
        // Показать чат
        function showChatScreen() {
            document.getElementById('connectScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
            document.getElementById('chatScreen').classList.add('flex');
            document.getElementById('messageInput').focus();
        }
        
        // Отключиться
        function disconnect() {
            if (connection) {
                connection.close();
            }
            location.reload();
        }
        
        // Скопировать ID
        function copyMyId() {
            const id = document.getElementById('myId').value;
            navigator.clipboard.writeText(id).then(() => {
                const tooltip = document.getElementById('copyTooltip');
                tooltip.classList.remove('hidden');
                setTimeout(() => tooltip.classList.add('hidden'), 2000);
            });
        }
        
        // Показать ошибку
        function showError(text) {
            const errorSection = document.getElementById('errorSection');
            document.getElementById('errorText').textContent = text;
            errorSection.classList.remove('hidden');
            setTimeout(() => errorSection.classList.add('hidden'), 3000);
        }
        
        // Звук уведомления
        function playNotification() {
            try {
                document.getElementById('notificationSound').play();
            } catch (e) {
                console.log('Звук не воспроизведён');
            }
            
            // Push-уведомление если страница не активна
            if (document.hidden && Notification.permission === 'granted') {
                new Notification('Пупсик Мессенджер 💕', {
                    body: 'Новое сообщение!',
                    icon: '💕'
                });
            }
        }
        
        // Запрос уведомлений
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
        
        // Запуск
        initPeer();
    </script>
</body>
</html>
